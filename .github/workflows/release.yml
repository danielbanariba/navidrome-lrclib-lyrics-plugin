name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write   # required to create the release and upload assets

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'          # PDK requires Go >= 1.25
          cache: true

      - name: Run tests
        run: go test ./...

      - uses: acifani/setup-tinygo@v2
        with:
          tinygo-version: '0.41.1'    # 0.37 is too old: it caps at Go 1.24 while the PDK needs 1.25+

      - name: Build .ndp
        run: make

      - name: Checksum
        run: sha256sum lrclib.ndp > lrclib.ndp.sha256

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            lrclib.ndp
            lrclib.ndp.sha256
          generate_release_notes: true
